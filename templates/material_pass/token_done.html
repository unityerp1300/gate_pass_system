<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Action Done</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#f0f4f8;font-family:Inter,Arial,sans-serif;">
<div class="container py-5" style="max-width:480px;">
    <div class="card shadow border-0 rounded-4 text-center">
        <div class="card-body p-4">
            <div style="font-size:48px;">{% if 'approved' in message %}✅{% elif 'rejected' in message %}❌{% else %}ℹ️{% endif %}</div>
            <h5 class="fw-bold mt-3" style="color:#2A2A86;">{{ message }}</h5>
            <p class="text-muted small">Pass: <strong>{{ gp.pass_number }}</strong></p>
        </div>
    </div>
</div>
</body>
</html>
