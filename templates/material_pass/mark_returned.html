{% extends 'base.html' %}
{% block title %}Mark Returned — {{ gp.pass_number }}{% endblock %}
{% block page_title %}Mark Material Returned{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h4><i class="bi bi-arrow-return-left me-2"></i>Mark Returned — {{ gp.pass_number }}</h4>
    </div>
</div>
<div class="row">
    <div class="col-lg-5">
        <div class="card">
            <div class="card-header">Return Details</div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Actual Return Date *</label>
                        {{ form.actual_return_date }}
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check me-1"></i>Confirm Return</button>
                        <a href="{% url 'material_pass:pass_detail' gp.pk %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
