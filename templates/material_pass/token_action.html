<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Gate Pass Action</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#f0f4f8;font-family:Inter,Arial,sans-serif;">
<div class="container py-5" style="max-width:560px;">
    <div class="card shadow border-0 rounded-4">
        <div class="card-body p-4">
            <h5 class="fw-bold mb-1" style="color:#2A2A86;">Material Gate Pass — {{ gp.pass_number }}</h5>
            <p class="text-muted small mb-3">{{ gp.employee.employee_name }} | {{ gp.party_name }} | {{ gp.pass_date }}</p>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Remarks (optional)</label>
                    <textarea name="remarks" class="form-control" rows="3"></textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" name="action_choice" value="approve" class="btn btn-success flex-fill">
                        ✓ Approve
                    </button>
                    <button type="submit" name="action_choice" value="reject" class="btn btn-danger flex-fill">
                        ✗ Reject
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
