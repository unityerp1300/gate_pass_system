{% extends 'base.html' %}
{% block title %}Action Complete{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 text-center">
    <div class="card shadow">
      <div class="card-body py-5">
        <i class="bi bi-check-circle-fill text-success" style="font-size:3rem;"></i>
        <h4 class="mt-3">{{ message }}</h4>
        <p class="text-muted">Pass: <strong>{{ vgp.pass_number }}</strong> — {{ vgp.visitor_name }}</p>
        <p class="text-muted">Status: <span class="badge bg-secondary">{{ vgp.get_status_display }}</span></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
