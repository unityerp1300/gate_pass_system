<!-- Notification Bell Icon Component -->
<style>
    .notification-bell-wrapper {
        position: relative;
        display: inline-block;
    }

    .notification-badge {
        position: absolute;
        top: -8px;
        right: -8px;
        background: linear-gradient(135deg, #e53e3e 0%, #c53030 100%);
        color: white;
        border-radius: 50%;
        width: 22px;
        height: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        border: 2px solid white;
        box-shadow: 0 2px 6px rgba(229, 62, 62, 0.4);
    }

    .notification-bell {
        background: none;
        border: none;
        color: var(--text);
        font-size: 20px;
        cursor: pointer;
        padding: 8px;
        transition: all 0.3s ease;
        position: relative;
    }

    .notification-bell:hover {
        color: var(--primary);
        transform: scale(1.1);
    }

    .notification-dropdown {
        position: absolute;
        right: 0;
        top: 100%;
        margin-top: 8px;
        background: var(--card-bg);
        border-radius: 12px;
        box-shadow: var(--shadow-2);
        min-width: 360px;
        max-height: 480px;
        overflow-y: auto;
        z-index: 1050;
        border: 1px solid var(--border);
        display: none;
    }

    .notification-dropdown.show {
        display: block;
    }

    .notification-header {
        padding: 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .notification-header h6 {
        margin: 0;
        font-weight: 700;
        color: var(--text);
    }

    .notification-item {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        transition: background-color 0.2s ease;
        cursor: pointer;
    }

    .notification-item:hover {
        background-color: rgba(30, 58, 95, 0.05);
    }

    .notification-item.unread {
        background-color: rgba(240, 165, 0, 0.08);
        border-left: 3px solid var(--accent);
    }

    .notification-item-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 4px;
    }

    .notification-item-title {
        font-weight: 600;
        color: var(--text);
        font-size: 14px;
        flex: 1;
    }

    .notification-item-date {
        font-size: 12px;
        color: var(--text-muted);
        white-space: nowrap;
        margin-left: 8px;
    }

    .notification-item-description {
        font-size: 13px;
        color: var(--text-muted);
        margin: 0;
        line-height: 1.4;
    }

    .notification-item-module {
        display: inline-block;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding: 3px 8px;
        border-radius: 4px;
        margin-top: 6px;
    }

    .notification-item-module.igp {
        background-color: rgba(34, 166, 122, 0.15);
        color: #22a67a;
    }

    .notification-item-module.vgp {
        background-color: rgba(63, 142, 214, 0.15);
        color: #2f8ed6;
    }

    .notification-item-module.mgp {
        background-color: rgba(242, 153, 27, 0.15);
        color: #f2991b;
    }

    .notification-item-module.hd {
        background-color: rgba(123, 75, 179, 0.15);
        color: #7b4bb3;
    }

    .notification-empty {
        padding: 32px 16px;
        text-align: center;
        color: var(--text-muted);
    }

    .notification-empty i {
        font-size: 36px;
        margin-bottom: 12px;
        opacity: 0.5;
    }

    .notification-footer {
        padding: 12px 16px;
        text-align: center;
        border-top: 1px solid var(--border);
    }

    .notification-footer a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
        font-size: 13px;
    }

    .notification-footer a:hover {
        text-decoration: underline;
    }

    /* Dark mode adjustments */
    html[data-theme="dark"] .notification-bell:hover {
        color: var(--accent);
    }

    html[data-theme="dark"] .notification-item:hover {
        background-color: rgba(45, 90, 142, 0.1);
    }
</style>

<div class="notification-bell-wrapper">
    <button class="notification-bell" id="notificationBell" onclick="toggleNotificationDropdown()">
        <i class="bi bi-bell-fill"></i>
        <span class="notification-badge" id="notificationBadge" style="display: none;">0</span>
    </button>

    <!-- Notification Dropdown -->
    <div class="notification-dropdown" id="notificationDropdown">
        <div class="notification-header">
            <h6>Notifications</h6>
            <div class="d-flex align-items-center gap-2">
                <button type="button" class="btn btn-sm btn-outline-danger py-0 px-2" onclick="clearNotifications()" title="Clear all notifications">
                    Clear
                </button>
                <button class="btn btn-sm btn-link p-0" onclick="closeNotificationDropdown()" style="color: var(--text-muted);">
                    <i class="bi bi-x"></i>
                </button>
            </div>
        </div>

        <div id="notificationList">
            <!-- Notifications will be loaded here via AJAX -->
            <div class="notification-empty">
                <i class="bi bi-inbox"></i>
                <p>No notifications</p>
            </div>
        </div>

        <div class="notification-footer">
            <a href="/accounts/audit-log/">View All Activity</a>
        </div>
    </div>
</div>

<script>
    function toggleNotificationDropdown() {
        const dropdown = document.getElementById('notificationDropdown');
        dropdown.classList.toggle('show');
        if (dropdown.classList.contains('show')) {
            loadNotifications();
            markNotificationsRead();
        }
    }

    function closeNotificationDropdown() {
        document.getElementById('notificationDropdown').classList.remove('show');
    }

    function loadNotifications() {
        fetch('{% url "accounts:get_notifications" %}', {
            method: 'GET',
            headers: {
                'X-Requested-With': 'XMLHttpRequest',
            }
        })
        .then(response => response.json())
        .then(data => {
            updateNotificationUI(data);
        })
        .catch(error => console.error('Error loading notifications:', error));
    }

    function updateNotificationUI(data) {
        const badge = document.getElementById('notificationBadge');
        const list = document.getElementById('notificationList');

        // Update badge
        if (data.unread_count > 0) {
            badge.textContent = data.unread_count > 99 ? '99+' : data.unread_count;
            badge.style.display = 'flex';
        } else {
            badge.style.display = 'none';
        }

        // Update list
        if (data.notifications.length === 0) {
            list.innerHTML = `
                <div class="notification-empty">
                    <i class="bi bi-inbox"></i>
                    <p>No notifications</p>
                </div>
            `;
            return;
        }

        let html = '';
        data.notifications.forEach(n => {
            const moduleClass = n.module ? n.module.toLowerCase() : '';
            const unreadClass = !n.is_read ? 'unread' : '';
            
            html += `
                <div class="notification-item ${unreadClass}">
                    <div class="notification-item-header">
                        <span class="notification-item-title">${n.title}</span>
                        <span class="notification-item-date">${n.created_at_display}</span>
                    </div>
                    ${n.description ? `<p class="notification-item-description">${n.description}</p>` : ''}
                    ${n.module ? `<span class="notification-item-module ${moduleClass}">${n.module}</span>` : ''}
                </div>
            `;
        });

        list.innerHTML = html;
    }

    function markNotificationsRead() {
        fetch('{% url "accounts:mark_notifications_read" %}', {
            method: 'POST',
            headers: {
                'X-CSRFToken': '{{ csrf_token }}',
                'X-Requested-With': 'XMLHttpRequest',
            }
        })
        .catch(error => console.error('Error marking notifications as read:', error));
    }

    function clearNotifications() {
        fetch('{% url "accounts:clear_notifications" %}', {
            method: 'POST',
            headers: {
                'X-CSRFToken': '{{ csrf_token }}',
                'X-Requested-With': 'XMLHttpRequest',
            }
        })
        .then(response => response.json())
        .then(data => {
            if (!data.ok) return;
            const badge = document.getElementById('notificationBadge');
            const list = document.getElementById('notificationList');
            badge.style.display = 'none';
            list.innerHTML = `
                <div class="notification-empty">
                    <i class="bi bi-inbox"></i>
                    <p>No notifications</p>
                </div>
            `;
        })
        .catch(error => console.error('Error clearing notifications:', error));
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
        const wrapper = document.querySelector('.notification-bell-wrapper');
        if (wrapper && !wrapper.contains(e.target)) {
            closeNotificationDropdown();
        }
    });

    // Load notifications periodically (every 30 seconds)
    setInterval(() => {
        fetch('{% url "accounts:get_notifications" %}', {
            method: 'GET',
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
        .then(response => response.json())
        .then(data => {
            const badge = document.getElementById('notificationBadge');
            if (data.unread_count > 0) {
                badge.textContent = data.unread_count > 99 ? '99+' : data.unread_count;
                badge.style.display = 'flex';
            } else {
                badge.style.display = 'none';
            }
        });
    }, 30000);

    // Initial load of badge count
    window.addEventListener('load', () => {
        fetch('{% url "accounts:get_notifications" %}', {
            method: 'GET',
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
        .then(response => response.json())
        .then(data => {
            const badge = document.getElementById('notificationBadge');
            if (data.unread_count > 0) {
                badge.textContent = data.unread_count > 99 ? '99+' : data.unread_count;
                badge.style.display = 'flex';
            }
        });
    });
</script>
