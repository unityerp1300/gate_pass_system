<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e3a5f" stop-opacity="0.0"/>
      <stop offset="1" stop-color="#1e3a5f" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- soft background -->
  <rect width="1600" height="900" fill="#ffffff"/>
  <rect width="1600" height="900" fill="url(#g)"/>

  <!-- header -->
  <text x="80" y="110" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="800" fill="#1e3a5f">Our Core Values</text>
  <rect x="80" y="140" width="1440" height="6" fill="#1e3a5f" opacity="0.65"/>

  <!-- panels -->
  <g transform="translate(140,220)">
    <g>
      <rect width="240" height="420" rx="22" fill="#f2991b"/>
      <text x="120" y="290" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="170" font-weight="900" fill="#ffffff" opacity="0.95">U</text>
      <rect y="345" width="240" height="75" fill="#1e3a5f" opacity="0.95"/>
      <text x="120" y="395" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="1.5" fill="#ffffff">UNWAVERING</text>
    </g>

    <g transform="translate(280,0)">
      <rect width="240" height="420" rx="22" fill="#e25572"/>
      <text x="120" y="290" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="170" font-weight="900" fill="#ffffff" opacity="0.95">N</text>
      <rect y="345" width="240" height="75" fill="#1e3a5f" opacity="0.95"/>
      <text x="120" y="395" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="1.5" fill="#ffffff">NURTURING</text>
    </g>

    <g transform="translate(560,0)">
      <rect width="240" height="420" rx="22" fill="#7b4bb3"/>
      <text x="120" y="290" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="170" font-weight="900" fill="#ffffff" opacity="0.95">I</text>
      <rect y="345" width="240" height="75" fill="#1e3a5f" opacity="0.95"/>
      <text x="120" y="395" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="1.5" fill="#ffffff">INTEGRITY</text>
    </g>

    <g transform="translate(840,0)">
      <rect width="240" height="420" rx="22" fill="#22a67a"/>
      <text x="120" y="290" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="170" font-weight="900" fill="#ffffff" opacity="0.95">T</text>
      <rect y="345" width="240" height="75" fill="#1e3a5f" opacity="0.95"/>
      <text x="120" y="395" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="1.5" fill="#ffffff">TRUST</text>
    </g>

    <g transform="translate(1120,0)">
      <rect width="240" height="420" rx="22" fill="#2f8ed6"/>
      <text x="120" y="290" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="170" font-weight="900" fill="#ffffff" opacity="0.95">Y</text>
      <rect y="345" width="240" height="75" fill="#1e3a5f" opacity="0.95"/>
      <text x="120" y="395" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="1.5" fill="#ffffff">YIELD</text>
    </g>
  </g>

  <!-- footer wave -->
  <path d="M0,760 C320,705 520,860 820,820 C1100,785 1220,705 1600,740 L1600,900 L0,900 Z" fill="#1e3a5f" opacity="0.92"/>
  <path d="M0,780 C320,725 520,880 820,840 C1100,805 1220,725 1600,760" fill="#f0a500" opacity="0.20" filter="url(#soft)"/>
  <text x="800" y="845" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="#ffffff" opacity="0.85">UNITY IS STRENGTH</text>
</svg>

